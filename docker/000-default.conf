<VirtualHost *:80>
    DocumentRoot /var/www/html/backend-sn

    # O Heroku php-apache2 buildpack fazia isto automaticamente; aqui tem de
    # ser explícito, senão $_SERVER['HTTP_AUTHORIZATION'] chega sempre vazio
    # ao PHP e os endpoints com Bearer token (auth.php) devolvem sempre 401.
    CGIPassAuth On

    <Directory /var/www/html/backend-sn>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
