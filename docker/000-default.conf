<VirtualHost *:80>
    DocumentRoot /var/www/html/backend-sn

    <Directory /var/www/html/backend-sn>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # O header Authorization chega ao PHP via a regra RewriteRule em
    # backend-sn/.htaccess (mais segura aqui: um erro em .htaccess não
    # impede o Apache de arrancar, ao contrário de um erro no vhost).

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
