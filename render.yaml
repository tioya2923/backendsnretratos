services:
  - type: web
    name: snretratos-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: PUSH_ADMIN_SECRET
        sync: false
      - key: BACKEND_URL
        value: https://snretratos-backend.onrender.com
      - key: FRONTEND_URL
        value: https://frontendsnretratos.onrender.com
      - key: CRON_SECRET
        sync: false
